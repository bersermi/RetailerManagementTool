## ── SCREEN: scrComprar ────────────────────────────────────────────────────────

OnVisible: |+
    =// ── UI STATE RESET ───────────────────────────────────────────────
    Set(varMenuOpen,     false);
    Set(varActiveMenuKey,"scrComprar");
    Set(varOcupado,      false);
    Set(varErrorMsg,     "");

    // ── TRANSACTION STATE RESET ────────────────────────────────────────
    // NOTE: Do NOT Set(varProveedorSel, Blank()) here — type inference error.
    // Instead reset record-type vars by setting to a known-shape empty record.
    // These will be set properly on first dropdown change event.
    Set(varPrecioAnterior, 0);
    Set(varCantidad,       1);
    Set(varPrecioUnit,     0);
    Set(varTotalLinea,     0);
    Set(varModoTotal,      false);

    // ── COLLECTION LOADS ─────────────────────────────────────────────────
    // Load once on entry; filter in-memory for all per-interaction lookups.
    // Only colPrecios is refreshed after each successful purchase.

    ClearCollect(
        colProveedores,
        SortByColumns(
            Filter(
                Providers,
                Workspace.'Workspace (crbc0_workspaceid)' = gblWorkspaceId
            ),
            "crbc0_name", SortOrder.Ascending
        )
    );

    ClearCollect(
        colProductos,
        SortByColumns(
            Filter(
                'Product Variants',
                Workspace.'Workspace (crbc0_workspaceid)' = gblWorkspaceId
                    && 'Is Active' = true
            ),
            "crbc0_name", SortOrder.Ascending
        )
    );

    // B-01: 'Provider Product Prices' must be present in Data panel first
    ClearCollect(
        colPrecios,
        Filter(
            'Provider Product Prices',
            Workspace.'Workspace (crbc0_workspaceid)' = gblWorkspaceId
        )
    );

