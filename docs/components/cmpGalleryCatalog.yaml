ComponentDefinitions:
  cmpGalleryCatalog:
    DefinitionType: CanvasComponent
    AllowCustomization: true
    CustomProperties:
      AllowStepperField:
        PropertyKind: Input
        DisplayName: AllowStepperField
        Description: A custom property
        DataType: Text
        Default: ="AllowStepper"
      DisabledField:
        PropertyKind: Input
        DisplayName: DisabledField
        Description: A custom property
        DataType: Text
        Default: ="Disabled"
      EnableManualEntry:
        PropertyKind: Input
        DisplayName: EnableManualEntry
        Description: A custom property
        DataType: Boolean
        Default: =true
      ItemsIn:
        PropertyKind: Input
        DisplayName: ItemsIn
        Description: A custom property
        DataType: Table
        Default: |-
          =Table(

              {
                  Key: "LINE-001",
                  PrimaryText: "Tomate Saladet",
                  SecondaryText: "Proveedor La Huerta",
                  UnitText: "Kg",
                  Qty: 1.5,
                  AllowStepper: false,
                  Step: 0.5,
                  MinQty: 0,
                  MaxQtyEnabled: false,
                  MaxQty: Blank(),
                  Disabled: false,
                  Photo: Blank(),
                  UnitPrice: 28.5,
                  CurrencySymbol: "$"
              },

              {
                  Key: "LINE-002",
                  PrimaryText: "Coca-Cola 355ml",
                  SecondaryText: "Caja 24 piezas",
                  UnitText: "Lata",
                  Qty: 2,
                  AllowStepper: true,
                  Step: 1,
                  MinQty: 0,
                  MaxQtyEnabled: true,
                  MaxQty: 10,
                  Disabled: false,
                  Photo: Blank(),
                  UnitPrice: 18,
                  CurrencySymbol: "$"
              },

              {
                  Key: "LINE-003",
                  PrimaryText: "Queso Oaxaca Artesanal Extra Largo Nombre Para Probar Ajuste",
                  SecondaryText: "Rancho San Miguel",
                  UnitText: "gr",
                  Qty: 250,
                  AllowStepper: false,
                  Step: 50,
                  MinQty: 100,
                  MaxQtyEnabled: true,
                  MaxQty: 1000,
                  Disabled: false,
                  Photo: Blank(),
                  UnitPrice: 0.32,
                  CurrencySymbol: "$"
              },

              {
                  Key: "LINE-004",
                  PrimaryText: "Manojo de Cilantro",
                  SecondaryText: "Producto fresco",
                  UnitText: "Manojo",
                  Qty: 1,
                  AllowStepper: true,
                  Step: 1,
                  MinQty: 1,
                  MaxQtyEnabled: false,
                  MaxQty: Blank(),
                  Disabled: false,
                  Photo: Blank(),
                  UnitPrice: 12,
                  CurrencySymbol: "$"
              },

              {
                  Key: "LINE-005",
                  PrimaryText: "Aceite Vegetal",
                  SecondaryText: "Botella 1L",
                  UnitText: "L",
                  Qty: 0.75,
                  AllowStepper: false,
                  Step: 0.25,
                  MinQty: 0,
                  MaxQtyEnabled: false,
                  MaxQty: Blank(),
                  Disabled: false,
                  Photo: Blank(),
                  UnitPrice: 46,
                  CurrencySymbol: "$"
              },

              {
                  Key: "LINE-006",
                  PrimaryText: "Producto Deshabilitado",
                  SecondaryText: "No disponible",
                  UnitText: "Paquete",
                  Qty: 3,
                  AllowStepper: true,
                  Step: 1,
                  MinQty: 0,
                  MaxQtyEnabled: true,
                  MaxQty: 5,
                  Disabled: true,
                  Photo: Blank(),
                  UnitPrice: 99,
                  CurrencySymbol: "$"
              }

          )
      KeyField:
        PropertyKind: Input
        DisplayName: KeyField
        Description: A custom property
        DataType: Text
        Default: ="LineId"
      MaxQtyEnabledField:
        PropertyKind: Input
        DisplayName: MaxQtyEnabledField
        Description: A custom property
        DataType: Text
        Default: ="MaxQtyEnabled"
      MaxQtyField:
        PropertyKind: Input
        DisplayName: MaxQtyField
        Description: A custom property
        DataType: Text
        Default: ="MaxQty"
      MinQtyField:
        PropertyKind: Input
        DisplayName: MinQtyField
        Description: A custom property
        DataType: Text
        Default: ="MinQty"
      OnQtyChange:
        PropertyKind: Event
        DisplayName: OnQtyChange
        Description: A custom property
        ReturnType: None
        Default: =
        Parameters:
          - Key:
              Description: A parameter
              DataType: Text
              Default: ="Text"
          - pNewQty:
              Description: A parameter
              DataType: Number
              Default: =100
      OnQuickActions:
        PropertyKind: Event
        DisplayName: OnQuickActions
        Description: A custom property
        ReturnType: None
        Default: =
        Parameters:
          - Key:
              Description: A parameter
              DataType: Text
              Default: ="Text"
      OnSelectItem:
        PropertyKind: Event
        DisplayName: OnSelectItem
        Description: A custom property
        ReturnType: None
        Default: =
        Parameters:
          - Key:
              Description: A parameter
              DataType: Text
              Default: ="Text"
      PhotoField:
        PropertyKind: Input
        DisplayName: PhotoField
        Description: A custom property
        DataType: Text
        Default: ="Photo"
      PrimaryTextField:
        PropertyKind: Input
        DisplayName: PrimaryTextField
        Description: A custom property
        DataType: Text
        Default: ="DisplayName"
      QtyField:
        PropertyKind: Input
        DisplayName: QtyField
        Description: A custom property
        DataType: Text
        Default: ="Qty"
      RowHeight:
        PropertyKind: Input
        DisplayName: RowHeight
        Description: A custom property
        DataType: Number
        Default: =200
      SecondaryTextField:
        PropertyKind: Input
        DisplayName: SecondaryTextField
        Description: A custom property
        DataType: Text
        Default: ="Subtitle"
      SelectedItemOut:
        PropertyKind: Output
        DisplayName: SelectedItemOut
        Description: A custom property
        DataType: Record
      SelectedKeyOut:
        PropertyKind: Output
        DisplayName: SelectedKeyOut
        Description: A custom property
        DataType: Text
      ShowPhoto:
        PropertyKind: Input
        DisplayName: ShowPhoto
        Description: A custom property
        DataType: Boolean
        Default: =true
      StepField:
        PropertyKind: Input
        DisplayName: StepField
        Description: A custom property
        DataType: Text
        Default: ="Step"
      UnitTextField:
        PropertyKind: Input
        DisplayName: UnitTextField
        Description: A custom property
        DataType: Text
        Default: ="UnitName"
    Properties:
      SelectedItemOut: =galCatalog.Selected
      SelectedKeyOut: =Text(galCatalog.Selected.Key)
    Children:
      - Container1:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            Height: =Parent.Height
            Width: =Parent.Width
          Children:
            - galCatalog:
                Control: Gallery@2.15.0
                Variant: Vertical
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Height: =Parent.Height
                  Items: =cmpGalleryCatalog.ItemsIn
                  OnSelect: =cmpGalleryCatalog.OnSelectItem(ThisItem.Key)
                  TemplatePadding: =10
                  TemplateSize: =cmpGalleryCatalog.RowHeight
                  Width: =Parent.Width
                Children:
                  - lblPrimary:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Semibold
                        Height: =43
                        OnSelect: =Select(Parent)
                        Size: |-
                          =With(
                              {
                                  n: Len(Coalesce(Self.Text, "")),
                                  base: 20
                              },
                              If(
                                  n <= 18, base,
                                  If(
                                      n <= 26, base - 2,
                                      If(
                                          n <= 34, base - 4,
                                          If(
                                              n <= 42, base - 6,
                                              base - 7
                                          )
                                      )
                                  )
                              )
                          )
                        Text: =ThisItem.PrimaryText
                        Width: =391
                        X: =16
                        Y: =17
                  - lblSecondary:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Font: =Font.'Open Sans'
                        Height: =24
                        OnSelect: =Select(Parent)
                        Size: |-
                          =With(
                              {
                                  n: Len(Coalesce(Self.Text, "")),
                                  base: 15
                              },
                              If(
                                  n <= 22, base,
                                  If(
                                      n <= 32, base - 1,
                                      If(
                                          n <= 42, base - 2,
                                          If(
                                              n <= 52, base - 3,
                                              base - 4
                                          )
                                      )
                                  )
                              )
                          )
                        Text: =ThisItem.SecondaryText
                        Width: =289
                        X: =16
                        Y: =60
                  - Icon2:
                      Control: Classic/Icon@2.5.0
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        BorderThickness: =2
                        Color: =RGBA(0, 18, 107, 1)
                        Height: =60
                        Icon: =Icon.More
                        OnSelect: =cmpGalleryCatalog.OnQuickActions(ThisItem.Key)
                        PaddingLeft: =5
                        PaddingRight: =5
                        PressedFill: =Self.Color
                        Width: =60
                        X: =553
                        Y: =7
                  - lblUnit:
                      Control: Label@2.5.1
                      Group: Group2
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Font: =Font.'Open Sans'
                        Height: =39
                        OnSelect: =Select(Parent)
                        Size: |-
                          =With(
                              {
                                  n: Len(Coalesce(Self.Text, "")),
                                  base: 15
                              },
                              If(
                                  n <= 3, base,
                                  If(
                                      n <= 5, base - 1,
                                      If(
                                          n <= 6, base - 2,
                                          If(
                                              n <= 7, base - 3,
                                              base - 4
                                          )
                                      )
                                  )
                              )
                          )
                        Text: =ThisItem.UnitText
                        Width: =53
                        X: =407
                        Y: =133
                  - txtQty:
                      Control: Classic/TextInput@2.3.2
                      Group: Group2
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Default: =Text(Coalesce(ThisItem.Qty, 0))
                        DisplayMode: =If(ThisItem.Disabled, DisplayMode.Disabled, DisplayMode.Edit)
                        Font: =Font.'Open Sans'
                        Format: =TextFormat.Number
                        Height: =56
                        HoverBorderColor: =RGBA(0, 18, 107, 1)
                        HoverFill: =RGBA(186, 202, 226, 1)
                        OnChange: |-
                          =With(
                              { v: IfError(Value(Self.Text), Blank()) },
                              If(
                                  IsBlank(v),
                                  Reset(Self),
                                  With(
                                      { clipped: Max(v, ThisItem.MinQty) },
                                      cmpGalleryCatalog.OnQtyChange(
                                          ThisItem.Key,
                                          clipped
                                      )
                                  )
                              )
                          )
                        OnSelect: =Select(Parent)
                        Size: =13
                        Visible: =cmpGalleryCatalog.EnableManualEntry
                        Width: =115
                        X: =292
                        Y: =125
                  - icoGalPlus:
                      Control: Classic/Icon@2.5.0
                      Group: Group2
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        BorderThickness: =2
                        Color: =RGBA(0, 18, 107, 1)
                        DisabledBorderColor: =RGBA(0, 18, 107, 1)
                        DisplayMode: |-
                          =If(
                              ThisItem.Disabled || !ThisItem.AllowStepper,
                              DisplayMode.Disabled,
                              DisplayMode.Edit
                          )
                        Height: =60
                        HoverColor: =RGBA(255, 255, 255, 1)
                        HoverFill: =ColorFade(RGBA(56, 96, 178, 1), -20%)
                        Icon: =Icon.Add
                        OnSelect: |-
                          =cmpGalleryCatalog.OnQtyChange(
                              ThisItem.Key,
                              Max(
                                  ThisItem.MinQty,
                                  Coalesce(ThisItem.Qty, 0) + Coalesce(ThisItem.Step, 1)
                              )
                          );
                          Reset(txtQty)
                        PaddingBottom: =5
                        PaddingLeft: =5
                        PaddingRight: =5
                        PaddingTop: =5
                        PressedFill: =Self.Color
                        Width: =60
                        X: =520
                        Y: =125
                  - icoGalMinus:
                      Control: Classic/Icon@2.5.0
                      Group: Group2
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        BorderThickness: =2
                        Color: =RGBA(0, 18, 107, 1)
                        DisabledBorderColor: =RGBA(0, 18, 107, 1)
                        DisplayMode: |-
                          =If(
                              ThisItem.Disabled || !ThisItem.AllowStepper || ThisItem.Qty <= ThisItem.MinQty,
                              DisplayMode.Disabled,
                              DisplayMode.Edit
                          )
                        Height: =60
                        HoverColor: =RGBA(255, 255, 255, 1)
                        HoverFill: =ColorFade(RGBA(56, 96, 178, 1), -20%)
                        Icon: =Icon.HorizontalLine
                        OnSelect: |-
                          =cmpGalleryCatalog.OnQtyChange(
                              ThisItem.Key,
                              Max(
                                  ThisItem.MinQty,
                                  Coalesce(ThisItem.Qty, 0) - Coalesce(ThisItem.Step, 1)
                              )
                          );
                          Reset(txtQty)
                        PaddingBottom: =5
                        PaddingLeft: =5
                        PaddingRight: =5
                        PaddingTop: =5
                        PressedFill: =Self.Color
                        Width: =60
                        X: =460
                        Y: =125
                  - recGalCatalogSeparator:
                      Control: Rectangle@2.3.0
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Fill: =RGBA(56, 96, 178, 1)
                        Height: =1
                        OnSelect: =Select(Parent)
                        Width: =Parent.Width
                  - lblGalUnitPrice:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Font: =Font.'Open Sans'
                        Height: =18
                        OnSelect: =Select(Parent)
                        Size: |-
                          =With(
                              {
                                  n: Len(Coalesce(Self.Text, "")),
                                  base: 17
                              },
                              If(
                                  n <= 3, base,
                                  If(
                                      n <= 5, base - 1,
                                      If(
                                          n <= 6, base - 2,
                                          If(
                                              n <= 7, base - 3,
                                              base - 4
                                          )
                                      )
                                  )
                              )
                          )
                        Text: |-
                          ="Precio: " & Coalesce(ThisItem.CurrencySymbol, "$") & Text(Coalesce(ThisItem.UnitPrice, 0), "[$-en-US]#,##0.00")
                        Width: =172
                        X: =16
                        Y: =91
