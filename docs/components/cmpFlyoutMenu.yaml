ComponentDefinitions:
  cmpFlyoutMenu:
    DefinitionType: CanvasComponent
    AllowCustomization: true
    CustomProperties:
      IsOpen:
        PropertyKind: Input
        DisplayName: IsOpen
        Description: A custom property
        DataType: Boolean
        Default: =true
      Items:
        PropertyKind: Input
        DisplayName: Items
        Description: A custom property
        DataType: Table
        Default: |+
          =Table(
              { ItemKey: "home", ItemLabel: "Home", Badge: Blank() }
          )
      MenuWidth:
        PropertyKind: Input
        DisplayName: MenuWidth
        Description: A custom property
        DataType: Number
        Default: =300
      OnClose:
        PropertyKind: Event
        DisplayName: OnClose
        Description: A custom property
        ReturnType: None
        Default: =
      OnSelectItem:
        PropertyKind: Event
        DisplayName: OnSelectItem
        Description: A custom property
        ReturnType: None
        Default: =
        Parameters:
          - ItemKey:
              Description: A parameter
              DataType: Text
              Default: ="Text"
      SelectedKey:
        PropertyKind: Input
        DisplayName: SelectedKey
        Description: A custom property
        DataType: Text
        Default: ="Text"
      SelectedKeyOut:
        PropertyKind: OutputFunction
        DisplayName: SelectedKeyOut
        Description: A custom property
        DataType: Text
      ShowUserBlock:
        PropertyKind: Input
        DisplayName: ShowUserBlock
        Description: A custom property
        DataType: Boolean
        Default: =true
      UserEmail:
        PropertyKind: Input
        DisplayName: UserEmail
        Description: A custom property
        DataType: Text
        Default: ="Text"
      UserName:
        PropertyKind: Input
        DisplayName: UserName
        Description: A custom property
        DataType: Text
        Default: ="Text"
    Properties:
      SelectedKeyOut: =galMenu.Selected.ItemKey
      Width: =360
    Children:
      - recFlyoutScrim:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Fill: =RGBA(0, 0, 0, 0.35)
            Height: =Parent.Height
            OnSelect: =cmpFlyoutMenu.OnClose()
            Visible: =cmpFlyoutMenu.IsOpen
            Width: =Parent.Width
      - recFlyoutPanel:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(226, 232, 240, 1)
            BorderThickness: =1
            Fill: =RGBA(255, 255, 255, 1)
            Height: =Parent.Height
            Visible: =cmpFlyoutMenu.IsOpen
            Width: |-
              =Min(
                  cmpFlyoutMenu.MenuWidth,
                  Parent.Width - 40
              )
            X: |-
              =If(
                  cmpFlyoutMenu.IsOpen,
                  Parent.Width - recFlyoutPanel.Width,
                  Parent.Width
              )
      - icoFlyoutClose:
          Control: Classic/Icon@2.5.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Color: =RGBA(0, 18, 107, 1)
            Height: =If(Parent.Width < 480, 28, 32)
            Icon: =Icon.Cancel
            OnSelect: =cmpFlyoutMenu.OnClose()
            Visible: =cmpFlyoutMenu.IsOpen
            Width: =If(Parent.Width < 480, 28, 32)
            X: =recFlyoutPanel.X + recFlyoutPanel.Width - Self.Width - 8
            Y: =8
      - lblUserName:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Font: =Font.'Open Sans'
            Height: =22
            Size: |-
              =With(
                  { base: If(Parent.Width < 480, 16, 18) },
                  If(
                      Len(Self.Text) <= 16, base,
                      If(
                          Len(Self.Text) <= 22, base - 2,
                          If(
                              Len(Self.Text) <= 30, base - 4,
                              base - 6
                          )
                      )
                  )
              )
            Text: =cmpFlyoutMenu.UserName
            Visible: =cmpFlyoutMenu.IsOpen && cmpFlyoutMenu.ShowUserBlock && !IsBlank(cmpFlyoutMenu.UserName)
            Width: =recFlyoutPanel.Width - 32 - icoFlyoutClose.Width
            Wrap: =false
            X: =recFlyoutPanel.X + 16
            Y: =16
      - lblUserEmail:
          Control: Label@2.5.1
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Font: =Font.'Open Sans'
            Size: =18
            Text: =cmpFlyoutMenu.UserEmail
            Visible: =cmpFlyoutMenu.IsOpen && cmpFlyoutMenu.ShowUserBlock && !IsBlank(cmpFlyoutMenu.UserEmail)
            Width: =recFlyoutPanel.Width - 32
            X: =recFlyoutPanel.X + 16
            Y: =lblUserName.Y + lblUserName.Height + 4
      - galMenu:
          Control: Gallery@2.15.0
          Variant: BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Default: =LookUp(cmpFlyoutMenu.Items, ItemKey = cmpFlyoutMenu.SelectedKey)
            Height: =Parent.Height - galMenu.Y
            Items: =cmpFlyoutMenu.Items
            OnSelect: =cmpFlyoutMenu.OnSelectItem(ThisItem.ItemKey)
            Width: =recFlyoutPanel.Width
            X: =recFlyoutPanel.X
            Y: |-
              =If(
                  cmpFlyoutMenu.ShowUserBlock,
                  72,
                  56
              )
          Children:
            - Title1:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 1)
                  Color: =RGBA(50, 49, 48, 1)
                  Font: =Font.'Open Sans'
                  FontWeight: =If(ThisItem.IsSelected, FontWeight.Semibold, FontWeight.Normal)
                  Height: =Self.Size * 1.8
                  OnSelect: =Select(Parent)
                  PaddingBottom: =0
                  PaddingLeft: =0
                  PaddingRight: =0
                  PaddingTop: =0
                  Size: =14
                  Text: =ThisItem.ItemLabel
                  VerticalAlign: =VerticalAlign.Top
                  Width: =Parent.TemplateWidth - 173
                  X: =103
                  Y: =(Parent.TemplateHeight - (Self.Size * 1.8)) / 2
            - NextArrow1:
                Control: Classic/Icon@2.5.0
                Properties:
                  AccessibleLabel: =Self.Tooltip
                  BorderColor: =RGBA(0, 0, 0, 1)
                  Color: =RGBA(166, 166, 166, 1)
                  DisabledBorderColor: =RGBA(56, 56, 56, 1)
                  DisabledColor: =RGBA(119, 119, 119, 1)
                  Height: =50
                  Icon: =Icon.ChevronRight
                  OnSelect: =Select(Parent)
                  PaddingBottom: =16
                  PaddingLeft: =16
                  PaddingRight: =16
                  PaddingTop: =16
                  Tooltip: ="View item details"
                  Width: =50
                  X: =Parent.TemplateWidth - Self.Width - 12
                  Y: =(Parent.TemplateHeight / 2) - (Self.Height / 2)
            - Separator1:
                Control: Rectangle@2.3.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Fill: =RGBA(255, 255, 255, 1)
                  Height: =8
                  OnSelect: =Select(Parent)
                  Width: =Parent.TemplateWidth
                  Y: =Parent.TemplateHeight - Self.Height
            - Rectangle3:
                Control: Rectangle@2.3.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Fill: |-
                    =If(
                        ThisItem.ItemKey = cmpFlyoutMenu.SelectedKey,
                        RGBA(37, 99, 235, 1),
                        RGBA(0, 0, 0, 0)
                    )
                  Height: =Parent.TemplateHeight - Separator1.Height
                  OnSelect: =Select(Parent)
                  Visible: =ThisItem.IsSelected
                  Width: =4
